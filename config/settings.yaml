# Agent settings

scraping:
  lookback_days: 30          # How many days back to search for content
  max_results_per_source: 2  # Max results per entity per source (set to 10+ for production)
  request_timeout: 30        # HTTP timeout in seconds
  retry_attempts: 3          # Retry failed requests this many times
  # YouTube Data API: each search.list ≈ 100 quota units/day (default free tier 10,000).
  # Set false while testing to use news + podcast + Seeking Alpha only.
  youtube_enabled: true
  youtube_max_search_queries_per_entity: 4  # Cap distinct searches per entity (fewer = slower quota burn)

analysis:
  model: "claude-opus-4-6"
  max_chunk_chars: 80000     # Transcript chunk size before splitting
  max_parallel_chunks: 5     # Concurrent Claude calls per transcript

investment:
  model: "claude-opus-4-6"
  top_opportunities: 10      # Per report (combined) or per watchlist entity (when group_by_entity is true)
  # When true: one Claude mapping call per entity; HTML/PDF group cards under each name (e.g. "Google — ideas from their remarks").
  group_by_entity: false
  include_crypto: true
  include_private: true

output:
  output_dir: "output"       # Relative to project root
  keep_runs: 10              # Number of past runs to retain

scheduler:
  enabled: true
  # cron schedule — default: every Sunday at 8 PM
  day_of_week: sun
  hour: 20
  minute: 0
  timezone: "America/New_York"
